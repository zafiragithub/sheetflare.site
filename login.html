<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otentikasi Member - SheetFlare</title>
    
    <script>
        if(sessionStorage.getItem('user_email')) window.location.replace('dashboard.html');
    </script>
    
    <script src="config.js?v=2026"></script>

    <script>
        (function() {
            const CACHE_KEY = 'melimpah_global_settings';
            const CACHE_AGE = 60 * 60 * 1000; 
            let cachedFav = localStorage.getItem('site_favicon');
            
            function applyFavicon(url) {
                if(!url) return;
                let link = document.querySelector("link[rel~='icon']");
                if (!link) {
                    link = document.createElement('link');
                    link.rel = 'icon';
                    document.head.appendChild(link);
                }
                link.href = url;
            }

            function applyWhiteLabel(data) {
                if(data.site_name) {
                    document.title = document.title.replace(/Melimpah Digital/gi, data.site_name).replace(/Melimpah/gi, data.site_name).replace(/Sistem Digital/gi, data.site_name);
                }
                const updateDomElements = () => {
                    if(data.site_name) {
                        document.querySelectorAll('.dyn-site-name').forEach(el => el.innerText = data.site_name);
                    }
                };
                if (document.readyState === 'loading') {
                    document.addEventListener('DOMContentLoaded', updateDomElements);
                } else {
                    updateDomElements();
                }
            }

            if(cachedFav) applyFavicon(cachedFav);

            const cachedStr = localStorage.getItem(CACHE_KEY);
            let cached = null;
            try { cached = JSON.parse(cachedStr); } catch(e){}
            const now = Date.now();

            if (cached && cached.data) applyWhiteLabel(cached.data); 

            if (!cached || !cached.time || (now - cached.time > CACHE_AGE)) {
                if(typeof window.SCRIPT_URL !== 'undefined' || typeof SCRIPT_URL !== 'undefined') {
                    const targetUrl = window.SCRIPT_URL || SCRIPT_URL;
                    fetch(targetUrl, { method: 'POST', body: JSON.stringify({ action: 'get_global_settings' }) })
                        .then(res => res.json())
                        .then(r => {
                            if(r.status === 'success' && r.data) {
                                localStorage.setItem(CACHE_KEY, JSON.stringify({ data: r.data, time: now }));
                                applyWhiteLabel(r.data);
                                if(r.data.site_favicon && cachedFav !== r.data.site_favicon) {
                                    localStorage.setItem('site_favicon', r.data.site_favicon); 
                                    applyFavicon(r.data.site_favicon); 
                                }
                            }
                        }).catch(e => {});
                }
            }
        })();
    </script>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --brand-blue: #00aae7;
            --brand-blue-hover: #0092c7;
            --slate-50: #f8fafc; --slate-100: #f1f5f9; --slate-200: #e2e8f0; --slate-300: #cbd5e1; --slate-400: #94a3b8; --slate-500: #64748b; --slate-600: #475569; --slate-700: #334155; --slate-800: #1e293b; --slate-900: #0f172a;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--slate-50); 
            color: var(--slate-900); 
            -webkit-font-smoothing: antialiased; 
        }

        .auth-layout {
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1rem; position: relative; overflow: hidden;
        }

        .bg-orb {
            position: absolute; width: 24rem; height: 24rem; border-radius: 50%; filter: blur(120px); opacity: 0.4; pointer-events: none; mix-blend-mode: multiply;
        }
        .bg-orb-1 { top: -10%; left: -10%; background-color: #e0f2fe; }
        .bg-orb-2 { bottom: -10%; right: -10%; background-color: #bae6fd; }

        .auth-card {
            background-color: #ffffff; padding: 2.5rem; border-radius: 0.5rem; width: 100%; max-width: 28rem; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); border: 1px solid var(--slate-200); position: relative; z-index: 10; transition: all 0.3s ease;
        }

        .auth-title { font-size: 1.5rem; font-weight: 900; color: var(--slate-800); text-align: center; text-transform: uppercase; letter-spacing: -0.05em; margin-bottom: 0.5rem; }
        .auth-title .highlight { color: var(--brand-blue); }
        .auth-subtitle { text-align: center; color: var(--slate-500); font-size: 0.75rem; margin-bottom: 2rem; }

        .form-group { margin-bottom: 1.25rem; }
        .form-label { display: block; font-size: 0.625rem; font-weight: 800; color: var(--slate-500); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.5rem; margin-left: 0.25rem; }

        .input-wrapper { position: relative; }
        .input-icon { position: absolute; top: 50%; transform: translateY(-50%); left: 1rem; color: var(--slate-400); pointer-events: none; display: flex; align-items: center; }
        .input-icon svg { width: 1.25rem; height: 1.25rem; }

        .input-field {
            width: 100%; padding: 0.875rem 3rem 0.875rem 3rem; background-color: white; border-radius: 0.375rem; border: 1px solid var(--slate-300); outline: none; font-weight: 600; color: var(--slate-800); transition: all 0.2s ease; font-family: inherit; font-size: 0.875rem;
        }
        .input-field::placeholder { color: var(--slate-400); font-weight: 500; }
        .input-field-no-icon { padding-left: 1rem; }
        .input-field:focus { border-color: var(--brand-blue); box-shadow: 0 0 0 3px #e0f2fe; }
        
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

        .toggle-password {
            position: absolute; top: 50%; right: 1rem; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--slate-400); display: flex; align-items: center; justify-content: center; padding: 0; transition: color 0.2s ease;
        }
        .toggle-password:hover { color: var(--brand-blue); }
        .toggle-password svg { width: 1.25rem; height: 1.25rem; }

        .btn {
            width: 100%; margin-top: 1rem; padding: 1rem; border-radius: 0.375rem; font-weight: 800; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.05em; display: flex; justify-content: center; align-items: center; gap: 0.5rem; transition: all 0.2s ease; cursor: pointer; border: none; font-family: inherit;
        }
        .btn svg { width: 1rem; height: 1rem; }
        
        .btn-primary { background-color: var(--brand-blue); color: white; }
        .btn-primary:hover { background-color: var(--brand-blue-hover); }

        .btn-dark { background-color: var(--slate-800); color: white; }
        .btn-dark:hover { background-color: var(--slate-900); }

        .toggle-section { margin-top: 2rem; text-align: center; font-size: 0.75rem; font-weight: 600; color: var(--slate-500); }
        .toggle-link { color: var(--brand-blue); text-transform: uppercase; letter-spacing: 0.05em; margin-left: 0.25rem; text-decoration: underline; text-decoration-thickness: 1px; text-underline-offset: 3px; background: none; border: none; cursor: pointer; font-weight: 800; transition: color 0.2s ease; font-family: inherit; }
        .toggle-link:hover { color: var(--brand-blue-hover); }

        .back-home-wrap { margin-top: 2rem; text-align: center; position: relative; z-index: 10; }
        .btn-home { display: inline-flex; align-items: center; gap: 0.5rem; background: white; border: 1px solid var(--slate-200); color: var(--slate-500); padding: 0.6rem 1.25rem; border-radius: 9999px; font-weight: 700; font-size: 0.75rem; transition: all 0.2s ease; }
        .btn-home:hover { color: var(--slate-800); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .btn-home svg { width: 1rem; height: 1rem; }

        .hidden { display: none !important; }
        
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(5px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        .animate-spin { animation: spin 1s linear infinite; }

        #toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 12px; pointer-events: none; }
        .toast { display: flex; align-items: center; gap: 12px; padding: 14px 20px; border-radius: 0.375rem; font-size: 13px; font-weight: 700; color: white; opacity: 0; transform: translateY(20px); transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); max-width: 350px; line-height: 1.4; }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.success { background-color: var(--slate-800); }
        .toast.error { background-color: #dc2626; }
        .toast.warning { background-color: var(--slate-600); }
        .toast-icon { width: 1.25rem; height: 1.25rem; flex-shrink: 0; }
    </style>
</head>
<body>

    <div class="auth-layout">
        <div class="bg-orb bg-orb-1"></div>
        <div class="bg-orb bg-orb-2"></div>
        <div id="toast-container"></div>

        <div class="auth-card">
            <h1 class="auth-title">
                <span id="form-title">Login</span> <span class="dyn-site-name highlight">Member</span>
            </h1>
            <p id="form-subtitle" class="auth-subtitle">Silakan masuk untuk akses dashboard.</p>
            
            <div id="view-login" class="fade-in">
                <form id="form-login">
                    <div class="form-group">
                        <label class="form-label">Alamat Email</label>
                        <div class="input-wrapper">
                            <div class="input-icon"><i data-lucide="mail"></i></div>
                            <input type="email" id="email" class="input-field" placeholder="nama@email.com" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <div class="input-wrapper">
                            <div class="input-icon"><i data-lucide="lock"></i></div>
                            <input type="password" id="pass" class="input-field" placeholder="••••••••" required>
                            <button type="button" class="toggle-password" onclick="togglePasswordVisibility('pass', this)">
                                <i data-lucide="eye"></i>
                            </button>
                        </div>
                    </div>
                    
                    <button type="submit" id="btn-login" class="btn btn-primary">
                        Otentikasi Akun <i data-lucide="arrow-right"></i>
                    </button>
                </form>
                
                <div class="toggle-section">
                    Belum punya akun? <button onclick="toggleView('register')" class="toggle-link">Daftar Di Sini</button>
                </div>
            </div>

            <div id="view-register" class="hidden">
                <form id="form-register">
                    <div class="form-group">
                        <label class="form-label">Nama Lengkap</label>
                        <input type="text" id="reg-nama" class="input-field input-field-no-icon" placeholder="Budi Santoso" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Alamat Email</label>
                        <input type="email" id="reg-email" class="input-field input-field-no-icon" placeholder="budi@email.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Nomor WhatsApp</label>
                        <input type="number" id="reg-wa" class="input-field input-field-no-icon" placeholder="62812xxxx" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Buat Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="reg-pass" class="input-field input-field-no-icon" placeholder="Minimal 6 karakter" minlength="6" required>
                            <button type="button" class="toggle-password" onclick="togglePasswordVisibility('reg-pass', this)">
                                <i data-lucide="eye"></i>
                            </button>
                        </div>
                    </div>
                    
                    <button type="submit" id="btn-register" class="btn btn-dark">
                        Buat Akun Member
                    </button>
                </form>

                <div class="toggle-section">
                    Sudah punya akun? <button onclick="toggleView('login')" class="toggle-link">Login Di Sini</button>
                </div>
            </div>

        </div>
        
        <div class="back-home-wrap">
            <a href="index.html" class="btn-home">
                <i data-lucide="home"></i> Kembali ke Beranda
            </a>
        </div>
    </div>

    <script>
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            const ref = urlParams.get('ref');
            if(ref) localStorage.setItem('melimpah_affiliate', ref); 
        })();

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            let icon = 'check-circle';
            if (type === 'error') icon = 'x-circle';
            if (type === 'warning') icon = 'alert-triangle';

            toast.innerHTML = `<i data-lucide="${icon}" class="toast-icon"></i> <span>${message}</span>`;
            container.appendChild(toast);
            lucide.createIcons({ root: toast });

            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function toggleView(view) {
            const viewLogin = document.getElementById('view-login');
            const viewRegister = document.getElementById('view-register');
            const formTitle = document.getElementById('form-title');
            const formSubtitle = document.getElementById('form-subtitle');

            if (view === 'register') {
                viewLogin.classList.add('hidden');
                viewLogin.classList.remove('fade-in');
                viewRegister.classList.remove('hidden');
                viewRegister.classList.add('fade-in');
                
                formTitle.innerText = 'Daftar';
                formSubtitle.innerText = 'Buat akun gratis untuk mulai mengakses katalog.';
            } else {
                viewRegister.classList.add('hidden');
                viewRegister.classList.remove('fade-in');
                viewLogin.classList.remove('hidden');
                viewLogin.classList.add('fade-in');
                
                formTitle.innerText = 'Login';
                formSubtitle.innerText = 'Silakan masuk untuk akses dashboard.';
            }
        }

        function togglePasswordVisibility(inputId, btnElement) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                btnElement.innerHTML = '<i data-lucide="eye-off"></i>';
            } else {
                input.type = 'password';
                btnElement.innerHTML = '<i data-lucide="eye"></i>';
            }
            lucide.createIcons({ root: btnElement });
        }

        document.getElementById('form-login').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-login'); 
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i data-lucide="loader" class="animate-spin" style="width:1.25rem;height:1.25rem;"></i>'; 
            btn.disabled = true; 
            lucide.createIcons();

            try {
                const targetUrl = window.SCRIPT_URL || (typeof SCRIPT_URL !== 'undefined' ? SCRIPT_URL : null);
                if(!targetUrl) throw new Error("Config.js tidak terpanggil!");
                
                const res = await fetch(targetUrl, { 
                    method: 'POST', 
                    body: JSON.stringify({ 
                        action: 'login', 
                        email: document.getElementById('email').value, 
                        password: document.getElementById('pass').value 
                    })
                });
                const r = await res.json();
                
                if(r.status === 'success') {
                    sessionStorage.setItem('user_email', r.data.email);
                    sessionStorage.setItem('user_nama', r.data.nama);
                    sessionStorage.setItem('user_id', r.data.id); 
                    
                    showToast("Login Berhasil! Mengalihkan...", "success");
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
                } else { 
                    showToast(r.message, "error"); 
                    btn.innerHTML = originalText; btn.disabled = false; lucide.createIcons();
                }
            } catch (err) { 
                showToast('Gagal koneksi server!', 'error'); 
                btn.innerHTML = originalText; btn.disabled = false; lucide.createIcons();
            }
        };

        document.getElementById('form-register').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-register'); 
            const originalText = btn.innerText;
            btn.innerHTML = '<i data-lucide="loader" class="animate-spin" style="width:1.25rem;height:1.25rem;"></i>'; 
            btn.disabled = true;
            lucide.createIcons();

            const pData = {
                action: 'register_member',
                nama: document.getElementById('reg-nama').value,
                email: document.getElementById('reg-email').value,
                whatsapp: document.getElementById('reg-wa').value,
                password: document.getElementById('reg-pass').value,
                affiliate: localStorage.getItem('melimpah_affiliate') || "-" 
            };

            try {
                const targetUrl = window.SCRIPT_URL || (typeof SCRIPT_URL !== 'undefined' ? SCRIPT_URL : null);
                if(!targetUrl) throw new Error("Config.js tidak terpanggil!");
                
                const res = await fetch(targetUrl, { method: 'POST', body: JSON.stringify(pData) });
                const r = await res.json();
                
                if(r.status === 'success') {
                    showToast("Akun Berhasil Dibuat! Silakan Login.", "success");
                    document.getElementById('form-register').reset();
                    document.getElementById('email').value = pData.email;
                    setTimeout(() => { toggleView('login'); }, 1500);
                } else { 
                    showToast(r.message || "Gagal membuat akun.", "error"); 
                }
            } catch (err) { 
                showToast('Gagal koneksi server!', 'error'); 
            } finally {
                if (btn.innerHTML.includes('loader')) {
                    btn.innerText = originalText; btn.disabled = false; 
                }
            }
        };

        lucide.createIcons();
    </script>
</body>
</html>
